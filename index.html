<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chronogrid — Calendar &amp; Planner</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect x='2' y='2' width='28' height='28' rx='8.5' fill='%236366f1'/><rect x='7' y='7' width='8.5' height='8.5' rx='2.6' fill='%23ffffff'/><rect x='7' y='16.5' width='8.5' height='8.5' rx='2.6' fill='%23ffffff' opacity='0.55'/><rect x='16.5' y='16.5' width='8.5' height='8.5' rx='2.6' fill='%23ffffff' opacity='0.78'/><circle cx='20.75' cy='11.25' r='4.25' fill='none' stroke='%23ffffff' stroke-width='1.9'/><path d='M20.75 11.25V8.6M20.75 11.25l1.9 1.15' fill='none' stroke='%23ffffff' stroke-width='1.9' stroke-linecap='round'/></svg>" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="css/year.css" />
  <link rel="stylesheet" href="css/schedule.css" />
  <link rel="stylesheet" href="css/timeline.css" />
  <link rel="stylesheet" href="css/board.css" />
  <link rel="stylesheet" href="css/focus.css" />
  <link rel="stylesheet" href="css/analytics.css" />
  <link rel="stylesheet" href="css/guide.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 32 32" width="30" height="30" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="cgMark" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="var(--brand)"/>
                <stop offset="1" stop-color="#8b5cf6"/>
              </linearGradient>
            </defs>
            <rect x="2" y="2" width="28" height="28" rx="8.5" fill="url(#cgMark)"/>
            <rect x="7" y="7" width="8.5" height="8.5" rx="2.6" fill="#fff" opacity="0.95"/>
            <rect x="7" y="16.5" width="8.5" height="8.5" rx="2.6" fill="#fff" opacity="0.55"/>
            <rect x="16.5" y="16.5" width="8.5" height="8.5" rx="2.6" fill="#fff" opacity="0.78"/>
            <circle cx="20.75" cy="11.25" r="4.25" fill="none" stroke="#fff" stroke-width="1.9"/>
            <path d="M20.75 11.25V8.6M20.75 11.25l1.9 1.15" fill="none" stroke="#fff" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <div class="brand-text">
          <span class="brand-name">Chronogrid</span>
          <span class="brand-sub">Calendar &amp; planner</span>
        </div>
      </div>

      <button class="create-btn" id="btnCreate">
        <span class="create-ic" aria-hidden="true"></span>
        <span>Create</span>
      </button>

      <div class="mini-cal" id="miniCal"></div>

      <nav class="nav" id="nav" aria-label="Views"></nav>

      <div class="cal-list">
        <div class="cal-list-head">My calendars</div>
        <div id="calList"></div>
      </div>

      <div class="sidebar-foot">
        <button class="theme-switch" id="btnThemeToggle" title="Toggle light / dark" aria-label="Toggle light / dark theme">
          <span class="ts-track"><span class="ts-thumb"></span></span>
          <span class="ts-label">Theme</span>
        </button>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button class="btn btn-icon sidebar-toggle" id="btnSidebar" title="Toggle sidebar" aria-label="Toggle sidebar">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>
          <h1 class="view-title" id="viewTitle">Week</h1>
          <span class="view-range" id="viewRange"></span>
        </div>
        <div class="topbar-right">
          <div class="date-nav" id="dateNav">
            <button class="btn" id="btnToday">Today</button>
            <button class="btn btn-icon" id="btnPrev" aria-label="Previous"></button>
            <button class="btn btn-icon" id="btnNext" aria-label="Next"></button>
          </div>
          <button class="btn btn-icon help-btn" id="btnHelp" title="Take the tour" aria-label="Take the tour">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M9.2 9.3a2.8 2.8 0 0 1 5.4 1c0 1.9-2.6 2.3-2.6 4"/><path d="M12 17.4v.01"/></svg>
          </button>
          <div class="topbar-sep"></div>
          <button id="btnImport" class="btn btn-quiet">Import</button>
          <button id="btnExport" class="btn btn-primary">Export</button>
          <input type="file" id="fileInput" accept=".ics,text/calendar" hidden />
        </div>
      </header>

      <main class="stage" id="stage"></main>
    </div>
  </div>

  <div class="toast" id="toast" hidden></div>

  <script src="js/ics.js"></script>
  <script src="js/timers.js"></script>
  <script src="js/timeline.js"></script>
  <script src="js/store.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/views.js"></script>
  <script src="js/router.js"></script>
  <script src="js/selection.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/applyto.js"></script>
  <script src="js/minical.js"></script>
  <script src="js/day.js"></script>
  <script src="js/week.js"></script>
  <script src="js/workweek.js"></script>
  <script src="js/month.js"></script>
  <script src="js/year.js"></script>
  <script src="js/schedule.js"></script>
  <script src="js/timelineview.js"></script>
  <script src="js/board.js"></script>
  <script src="js/focus.js"></script>
  <script src="js/analytics.js"></script>
  <script src="js/timersview.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/guide.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
